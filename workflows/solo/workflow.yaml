name: solo
description: "Terminal + editor only, no agent team"

windows:
  - name: dev
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: 'yoloclaude --agent solo-developer-agent'
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

states: {}
