name: solo
description: "Terminal + editor only, no agent team"

windows:
  - name: dev
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: 'yoloclaude --agent solo-developer-agent'
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

scripts:
  worktree-merge:
    path: ./scripts/worktree-merge.sh
    description: "Rebase worktree branch onto main and fast-forward merge"
    cwd: "{{meta.worktree}}"
    env:
      FED_SESSION: "{{meta.tmux_session}}"
      FED_SESSION_DIR: "{{meta.session_dir}}"
      FED_REPO_DIR: "{{meta.worktree}}"
      FED_BRANCH: "{{meta.branch}}"
      FED_REPO: "{{meta.repo}}"
      FED_WORKFLOW: "{{meta.workflow}}"
      FED_REPO_ROOT: "{{repo.repo_root}}"

states: {}
