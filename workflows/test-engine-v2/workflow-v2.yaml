name: test-engine-v2
description: "Engine v2 test workflow with parallel"

window:
  panes:
    - id: human
      command: null

steps:
  - id: greet
    type: human
    description: "Tell the planner what you want to build"
    prompt: "Run: fed workflow respond done"

  - id: plan
    type: claude
    agent: test-planner
    description: "Create a plan"

  # Parallel review: claude and codex review the plan simultaneously
  - id: reviews
    type: parallel
    description: "Parallel review by claude and codex"
    branches:
      - id: review_claude
        type: claude
        agent: test-reviewer
        description: "Claude review"
      - id: review_codex
        type: codex
        agent: test-reviewer
        description: "Codex review"

  - id: done
    type: human
    description: "All done"
    prompt: "Parallel reviews complete! Run: fed workflow respond done"
