name: standalone
description: "通常のClaude Code起動"
engine: false

focus: standalone

windows:
  - name: review
    panes:
      - id: shell
        name: Shell
        pane: 1
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: standalone
    panes:
      - id: developer
        name: Developer
        pane: 1
        command: yoloclaude
      - id: human
        name: Human
        pane: 2
        command: "cd $FED_SESSION_DIR && nvim"
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1
