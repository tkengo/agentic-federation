name: standalone
description: "通常のClaude Code起動"

windows:
  - name: standalone
    panes:
      - id: claude
        name: Claude
        pane: 1
        command: fed claude --dangerously-skip-permissions
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

states:
  active:
    color: blue
    entry_point: true
