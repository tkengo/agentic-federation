name: test-brushup
description: "テストコードブラッシュアップ: データ収集・分析 → 改善計画策定 → リファクタリング → コードレビュー"

focus: analyzer

windows:
  - name: dev
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: null
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    # +-------------------------+-------------------------+
    # |        terminal         |         editor          |
    # |        (pane 1)         |        (pane 2)         |
    # +-------------------------+-------------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: analyzer
    panes:
      - id: analyzer
        name: Analyzer
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent test-brushup-analyzer'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    # +---------------------+---------------------+
    # |      analyzer       |       human         |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: agents
    panes:
      - id: refactorer
        name: Refactorer
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent test-brushup-refactorer'
      - id: profiler
        name: Profiler
        pane: 2
        command: yologemini
      - id: learnings
        name: Learnings
        pane: 3
        command: 'fed claude --dangerously-skip-permissions --agent test-brushup-learnings'
    # +-----------+-----------+-----------+
    # | refactorer|  profiler | learnings |
    # |  (pane 1) |  (pane 2) | (pane 3)  |
    # +-----------+-----------+-----------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 66 }
        - { source: 2, direction: h, percent: 50 }
      focus: 1

  - name: review
    panes:
      - id: code_reviewer_diff
        name: "Code Reviewer (Diff)"
        pane: 1
        command: yolocodex
      - id: code_reviewer_conventions
        name: "Code Reviewer (Conventions)"
        pane: 2
        command: yolocodex
      - id: code_reviewer_history
        name: "Code Reviewer (History)"
        pane: 3
        command: yologemini
      - id: static_checker
        name: "Static Checker"
        pane: 4
        command: yolocodex
      - id: code_review_integrator
        name: "Code Review Integrator"
        pane: 5
        command: 'fed claude --dangerously-skip-permissions --agent test-brushup-code-review-integrator'
    # +------+------+------+--------+
    # | diff | conv | hist | static |
    # | (1)  | (2)  | (3)  |  (4)   |
    # +------+------+------+--------+
    # |           integrator        |
    # |             (5)             |
    # +------+------+------+--------+
    layout:
      splits:
        - { source: 1, direction: v, percent: 50 }
        - { source: 1, direction: h, percent: 75 }
        - { source: 2, direction: h, percent: 66 }
        - { source: 3, direction: h, percent: 50 }
      focus: 1

states:
  analysis:
    description: "テストコードの分析・データ収集・改善計画の策定"
    color: blue
    entry_point: true
  human_plan_review:
    description: "人間に改善計画をレビューしてもらう"
    color: yellow
  refactoring:
    description: "改善計画に基づくテストコードのリファクタリング"
    color: blue
  code_review:
    description: "4並列レビュアー（diff/conventions/history/static）+ integrator によるコードレビュー"
    color: yellow
  code_revision:
    description: "レビューフィードバックに基づくコード修正"
    color: yellow
  post_processing:
    description: "知見抽出の後処理フェーズ"
    color: cyan
  completed:
    description: "全レビュー通過、人間の最終承認待ち"
    mark: "✓"
    color: green
  waiting_human:
    description: "エスカレーション - 人間の判断待ち"
    color: magenta
