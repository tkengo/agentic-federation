name: req-spec
description: "要件定義ワークフロー: 要件分析 → 並列レビュー → 統合 → 要件定義書"

focus: analyst

windows:
  - name: review
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: null
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    # +---------------------+---------------------+
    # |     Terminal        |      Editor         |
    # |     (pane 1)        |     (pane 2)        |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: analyst
    panes:
      - id: analyst
        name: Analyst
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent analyst'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    # +---------------------+---------------------+
    # |      Analyst        |       Human         |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: reviewers
    panes:
      - id: spec_revisor
        name: "Spec Revisor"
        pane: 1
        command: 'fed claude --dangerously-skip-permissions'
      - id: tech_reviewer
        name: "Tech Reviewer"
        pane: 2
        command: yolocodex
      - id: ux_reviewer
        name: "UX Reviewer"
        pane: 3
        command: yolocodex
      - id: trend_researcher
        name: "Trend Researcher"
        pane: 4
        command: yolocodex
      - id: security_reviewer
        name: "Security Reviewer"
        pane: 5
        command: yolocodex
    # +----------+----------+----------+
    # | revisor  | tech_rev | ux_rev   |
    # | (pane 1) | (pane 2) | (pane 3) |
    # +----------+----------+----------+
    # | trend    | security |          |
    # | (pane 4) | (pane 5) |          |
    # +----------+----------+----------+
    layout:
      splits:
        - { source: 1, direction: v, percent: 50 }
        - { source: 1, direction: h, percent: 66 }
        - { source: 2, direction: h, percent: 50 }
        - { source: 4, direction: h, percent: 50 }
      focus: 1

states:
  analysis:
    description: "人間と対話しながら要件を分析・整理する"
    color: blue
    entry_point: true
    transitions:
      done: human_draft_review

  human_draft_review:
    description: "人間にドラフト仕様レビューをお願いする"
    color: yellow
    wait_human: true
    transitions:
      approved: spec_review
      feedback: analysis

  spec_review:
    description: "複数レビュアーによる並列仕様レビュー"
    color: yellow
    tasks:
      - pane: tech_reviewer
        agent: tech-reviewer
      - pane: ux_reviewer
        agent: ux-reviewer
      - pane: trend_researcher
        agent: trend-researcher
      - pane: security_reviewer
        agent: security-reviewer
    transitions:
      done: spec_revision

  spec_revision:
    description: "レビューフィードバックに基づく仕様修正"
    color: yellow
    tasks:
      - pane: spec_revisor
        agent: spec-revisor
    transitions:
      approved: human_final_review
      request_changes: spec_review
      escalate: waiting_human

  human_final_review:
    description: "人間に最終仕様レビューをお願いする"
    mark: "✓"
    color: green
    wait_human: true
    transitions:
      approved: completed
      feedback: analysis

  completed:
    description: "要件定義ワークフロー完了"
    mark: "+"
    color: green
    terminal: true

  waiting_human:
    description: "エスカレーション - 人間の判断待ち"
    color: magenta
    terminal: true
