name: dev-team
description: "開発チームパイプライン: 計画策定 → 計画レビュー → 実装 → コードレビュー"

windows:
  - name: dev
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: null
      - id: editor
        name: Editor
        pane: 2
        command: nvim
      - id: dev_server
        name: Dev Server
        pane: 3
        command: "{{repo.extra.dev_server}}"
    layout:
      splits:
        - { source: 1, direction: v, percent: 10 }
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: planner
    panes:
      - id: planner
        name: Planner
        pane: 1
        command: 'yoloclaude --agent dev-team-v2-planner'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    # +---------------------+---------------------+
    # |      planner        |       human         |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: agents
    panes:
      - id: plan_revisor
        name: "Plan Revisor"
        pane: 1
        command: 'yoloclaude --agent dev-team-v2-plan-revisor'
      - id: plan_reviewer_gemini
        name: "Plan Reviewer (Gemini)"
        pane: 2
        command: yologemini
      - id: plan_reviewer_codex
        name: "Plan Reviewer (Codex)"
        pane: 3
        command: yolocodex
      - id: implementer
        name: Implementer
        pane: 4
        command: 'yoloclaude --agent dev-team-v2-implementer'
      - id: code_reviewer_gemini
        name: "Code Reviewer (Gemini)"
        pane: 5
        command: yologemini
      - id: code_reviewer_codex
        name: "Code Reviewer (Codex)"
        pane: 6
        command: yolocodex
    # +----------+----------+----------+
    # | revisor  | pln-rev  | pln-rev  |
    # | (pane 1) | gem (2)  | codex(3) |
    # +----------+----------+----------+
    # | implmtr  | code-rev | code-rev |
    # | (pane 4) | gem (5)  | codex(6) |
    # +----------+----------+----------+
    layout:
      splits:
        - { source: 1, direction: v, percent: 50 }
        - { source: 1, direction: h, percent: 66 }
        - { source: 2, direction: h, percent: 50 }
        - { source: 4, direction: h, percent: 66 }
        - { source: 5, direction: h, percent: 50 }
      focus: 1

states:
  planning:
    description: "人間と対話しながら計画を策定する"
    color: blue
    entry_point: true
  human_plan_review:
    description: "人間に計画レビューをお願いする"
    color: blue
  plan_review:
    description: "複数レビュアーによる並列計画レビュー"
    color: yellow
  plan_revision:
    description: "レビューフィードバックに基づく計画修正"
    color: yellow
  implementing:
    description: "計画に基づく実装フェーズ"
    color: blue
  code_review:
    description: "複数レビュアーによる並列コードレビュー"
    color: yellow
  code_revision:
    description: "レビューフィードバックに基づくコード修正"
    color: yellow
  completed:
    description: "全レビュー通過、人間の最終承認待ち"
    mark: "✓"
    color: green
  approved:
    description: "ワークフロー完了"
    mark: "+"
    color: green
  waiting_human:
    description: "エスカレーション - 人間の判断待ち"
    color: magenta
