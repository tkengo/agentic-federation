name: ultra-debug
description: "根本原因分析: 仮説形成 → 並行調査 → 敵対的検証 → レポート生成"

focus: orchestrator

windows:
  - name: orchestrator
    panes:
      - id: orchestrator
        name: Orchestrator
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent orchestrator'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    # +---------------------+---------------------+
    # |    orchestrator     |       human         |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: investigate
    panes:
      - id: debugger_1
        name: "Debugger 1"
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent debugger'
      - id: debugger_2
        name: "Debugger 2"
        pane: 2
        command: 'fed claude --dangerously-skip-permissions --agent debugger'
      - id: debugger_3
        name: "Debugger 3"
        pane: 3
        command: 'fed claude --dangerously-skip-permissions --agent debugger'
      - id: debugger_4
        name: "Debugger 4"
        pane: 4
        command: 'fed claude --dangerously-skip-permissions --agent debugger'
      - id: debugger_5
        name: "Debugger 5"
        pane: 5
        command: 'fed claude --dangerously-skip-permissions --agent debugger'
      - id: critic
        name: Critic
        pane: 6
        command: 'fed claude --dangerously-skip-permissions --agent critic'
    # +----------+----------+----------+
    # |debugger-1|debugger-2|debugger-3|
    # | (pane 1) | (pane 2) | (pane 3) |
    # +----------+----------+----------+
    # |debugger-4|debugger-5|  critic  |
    # | (pane 4) | (pane 5) | (pane 6) |
    # +----------+----------+----------+
    layout:
      splits:
        - { source: 1, direction: v, percent: 50 }
        - { source: 1, direction: h, percent: 66 }
        - { source: 2, direction: h, percent: 50 }
        - { source: 4, direction: h, percent: 66 }
        - { source: 5, direction: h, percent: 50 }
      focus: 1

states:
  gather_context:
    description: "人間から問題の説明を聞き、コンテキストを収集する"
    color: blue
    entry_point: true
    transitions:
      done: hypotheses

  hypotheses:
    description: "問題から5つの仮説を形成する"
    color: blue
    # tasks なし: orchestrator が gather_context から継続して仮説を形成
    transitions:
      done: investigating

  investigating:
    description: "5体のdebuggerが並行調査、criticが敵対的検証を実施"
    color: yellow
    tasks:
      - pane: debugger_1
        agent: debugger
      - pane: debugger_2
        agent: debugger
      - pane: debugger_3
        agent: debugger
      - pane: debugger_4
        agent: debugger
      - pane: debugger_5
        agent: debugger
      - pane: critic
        agent: critic
    transitions:
      done: synthesize

  synthesize:
    description: "全調査結果を統合してレポートを生成する"
    color: cyan
    tasks:
      - pane: orchestrator
        agent: orchestrator
    transitions:
      done: completed

  completed:
    description: "レポート生成完了"
    mark: "✓"
    color: green
    terminal: true
    wait_human: true

  waiting_human:
    description: "エスカレーション - 人間の判断待ち"
    color: magenta
    terminal: true
