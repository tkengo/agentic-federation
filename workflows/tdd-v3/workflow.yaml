name: tdd-v3
description: "TDD開発チームパイプライン（宣言的ステート遷移版）: 計画策定(擬似コード) → 計画レビュー → テスト実装 → 本実装 → コードレビュー → 後処理"

focus: planner

windows:
  - name: dev
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: null
      - id: editor
        name: Editor
        pane: 2
        command: nvim
      - id: dev_server
        name: Dev Server
        pane: 3
        command: "{{repo.extra.dev_server}}"
    layout:
      splits:
        - { source: 1, direction: v, percent: 10 }
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: planner
    panes:
      - id: planner
        name: Planner
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent planner'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    # +---------------------+---------------------+
    # |      planner        |       human         |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: implement
    panes:
      - id: plan_revisor
        name: "Plan Revisor"
        pane: 1
        command: 'fed claude --dangerously-skip-permissions'
      - id: plan_reviewer
        name: "Plan Reviewer"
        pane: 2
        command: yolocodex
      - id: test_implementer
        name: "Test Implementer"
        pane: 3
        command: 'fed claude --dangerously-skip-permissions'
      - id: test_reviewer
        name: "Test Reviewer"
        pane: 4
        command: yolocodex
      - id: implementer
        name: Implementer
        pane: 5
        command: 'fed claude --dangerously-skip-permissions'
    # +------------------------+------------------------+
    # |     plan_revisor       |                        |
    # |       (pane 1)         |   test_implementer     |
    # +------------------------+      (pane 3)          |
    # |     plan_reviewer      |                        |
    # |       (pane 2)         +------------------------+
    # +------------------------+                        |
    # |     test_reviewer      |     implementer        |
    # |       (pane 4)         |       (pane 5)         |
    # +------------------------+------------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
        - { source: 1, direction: v, percent: 66 }
        - { source: 2, direction: v, percent: 50 }
        - { source: 4, direction: v, percent: 50 }
      focus: 1

  - name: review
    panes:
      - id: code_reviewer_diff
        name: "Code Reviewer (Diff)"
        pane: 1
        command: yolocodex
      - id: code_reviewer_history
        name: "Code Reviewer (History)"
        pane: 2
        command: yologemini
      - id: code_reviewer_impact
        name: "Code Reviewer (Impact)"
        pane: 3
        command: 'fed claude --dangerously-skip-permissions'
      - id: code_reviewer_conventions
        name: "Code Reviewer (Conventions)"
        pane: 4
        command: yolocodex
      - id: code_review_integrator
        name: "Code Review Integrator"
        pane: 5
        command: 'fed claude --dangerously-skip-permissions'
    # +------+------+------+------+
    # |  A   |  B   |  C   |  D   |
    # | (1)  | (2)  | (3)  | (4)  |
    # +------+------+------+------+
    # |             E              |
    # |            (5)             |
    # +------+------+------+------+
    layout:
      splits:
        - { source: 1, direction: v, percent: 50 }
        - { source: 1, direction: h, percent: 75 }
        - { source: 2, direction: h, percent: 66 }
        - { source: 3, direction: h, percent: 50 }
      focus: 1

  - name: postprocess
    panes:
      - id: learnings
        name: "Learnings"
        pane: 1
        command: 'fed claude --dangerously-skip-permissions'
      - id: evidence
        name: "Evidence"
        pane: 2
        command: 'fed claude --dangerously-skip-permissions'
    # +---------------------+---------------------+
    # |     learnings       |      evidence       |
    # |      (pane 1)       |      (pane 2)       |
    # +---------------------+---------------------+
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

states:
  planning:
    description: "人間と対話しながら擬似コードベースの計画を策定する"
    color: blue
    entry_point: true
    transitions:
      done: human_plan_review

  human_plan_review:
    description: "人間に計画レビューをお願いする"
    color: blue
    wait_human: true
    transitions:
      approved: plan_review
      feedback: planning

  plan_review:
    description: "計画レビュー（TDD適合性を含む）"
    color: yellow
    tasks:
      - pane: plan_reviewer
        agent: plan-reviewer
    transitions:
      approved: test_implementing
      request_changes: plan_revision
      escalate: waiting_human

  plan_revision:
    description: "レビューFBに基づく計画修正"
    color: yellow
    tasks:
      - pane: plan_revisor
        agent: plan-revisor
    transitions:
      done: plan_review

  test_implementing:
    description: "計画の擬似コードに基づくテスト実装フェーズ"
    color: cyan
    tasks:
      - pane: test_implementer
        agent: test-implementer
    transitions:
      done: test_review

  test_review:
    description: "テストコードの品質レビュー"
    color: cyan
    tasks:
      - pane: test_reviewer
        agent: test-reviewer
    transitions:
      approved: test_acceptance
      request_changes: test_revision
      escalate: waiting_human

  test_acceptance:
    description: "実装者によるテスト受入判断と本実装"
    color: cyan
    tasks:
      - pane: implementer
        agent: implementer
    transitions:
      accepted: implementing
      rejected: test_revision
      escalate: waiting_human

  test_revision:
    description: "フィードバックに基づくテスト修正"
    color: cyan
    tasks:
      - pane: test_implementer
        agent: test-implementer
    transitions:
      done: test_review

  implementing:
    description: "テストを満たす本実装フェーズ"
    color: blue
    # tasks なし: implementerがtest_acceptanceから継続して実装を行い、完了時にdone遷移する
    transitions:
      done: code_review

  code_review:
    description: "複数レビュアーによる並列コードレビュー"
    color: yellow
    tasks:
      - pane: code_reviewer_diff
        agent: code-reviewer-diff
      - pane: code_reviewer_history
        agent: code-reviewer-history
      - pane: code_reviewer_impact
        agent: code-reviewer-impact
      - pane: code_reviewer_conventions
        agent: code-reviewer-conventions
    transitions:
      done: code_review_aggregation

  code_review_aggregation:
    description: "レビュー結果の統合・判定"
    color: yellow
    tasks:
      - pane: code_review_integrator
        agent: code-review-integrator
    transitions:
      approved: post_processing
      request_changes: code_revision
      escalate: waiting_human

  code_revision:
    description: "レビューFBに基づくコード修正"
    color: yellow
    tasks:
      - pane: implementer
        agent: implementer
    transitions:
      done: code_review

  post_processing:
    description: "知見抽出・エビデンス収集の後処理フェーズ"
    color: cyan
    tasks:
      - pane: learnings
        agent: learnings
      - pane: evidence
        agent: frontend-evidence
    transitions:
      done: completed

  completed:
    description: "全レビュー通過、人間の最終承認待ち"
    mark: "✓"
    color: green
    wait_human: true
    transitions:
      approved: approved

  approved:
    description: "ワークフロー完了"
    mark: "+"
    color: green
    terminal: true

  waiting_human:
    description: "エスカレーション - 人間の判断待ち"
    color: magenta
    terminal: true
