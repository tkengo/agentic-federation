name: solo-dev
description: "ソロ開発用"

focus: solo-dev

windows:
  - name: review
    panes:
      - id: terminal
        name: Terminal
        pane: 1
        command: null
      - id: editor
        name: Editor
        pane: 2
        command: nvim
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

  - name: solo-dev
    panes:
      - id: developer
        name: Developer
        pane: 1
        command: 'fed claude --dangerously-skip-permissions --agent solo-dev-developer-agent'
      - id: human
        name: Human
        pane: 2
        command: "cd {{meta.session_dir}} && nvim"
    layout:
      splits:
        - { source: 1, direction: h, percent: 50 }
      focus: 1

states:
  planning:
    description: "人間と対話しながら計画を策定する"
    color: blue
    entry_point: true
    transitions:
      done: human_plan_review

  human_plan_review:
    description: "人間に計画をレビューしてもらう"
    color: yellow
    wait_human: true
    transitions:
      approved: implement
      feedback: planning

  implement:
    description: "計画を元に実装する"
    color: blue
    transitions:
      done: human_code_review

  human_code_review:
    description: "人間にコードレビューしてもらう"
    color: yellow
    wait_human: true
    transitions:
      approved: completed
      feedback: implement
      replanning: planning

  completed:
    description: "ワークフロー完了"
    mark: "✓"
    color: green
    terminal: true
